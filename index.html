<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content">
<title>Roamize</title>
<meta name="description" content="Roamize — Nathan's personal trip HQ">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roamize">
<meta name="theme-color" content="#0b0e14">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ============================================================
   ROAMIZE — design tokens. Change the vibe of the whole app here.
   ============================================================ */
:root{
  --bg:#0b0e14;
  --surface:#131826;
  --surface-2:#1a2133;
  --border:#232c42;
  --text:#e9edf5;
  --muted:#8b95ab;
  --accent:#5176AB;        /* Mize blue */
  --accent-light:#7da2d9;
  --accent-dim:rgba(81,118,171,.18);
  --good:#5fb98a; --warn:#d9a55f; --bad:#d96b6b;
  --radius:16px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  overscroll-behavior:none;-webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);
}
button{font-family:var(--font);border:none;background:none;color:inherit;cursor:pointer}
input,textarea,select{
  font-family:var(--font);background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;padding:10px 12px;font-size:15px;width:100%;
  outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
::placeholder{color:var(--muted);opacity:.7}

/* ---------- header ---------- */
header{
  position:fixed;top:0;left:0;right:0;z-index:900;
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(11,14,20,.97),rgba(11,14,20,.88));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:19px;letter-spacing:-.3px;user-select:none}
.logo .mark{
  width:28px;height:28px;border-radius:8px;background:var(--accent);
  display:grid;place-items:center;font-size:15px;font-weight:800;color:#fff;
}
.trip-switch{
  display:flex;align-items:center;gap:6px;background:var(--surface);
  border:1px solid var(--border);border-radius:999px;padding:7px 12px;
  font-size:14px;font-weight:600;max-width:52vw;
}
.trip-switch span.name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trip-switch svg{flex:none;opacity:.6}

/* ---------- layout ---------- */
main{padding:calc(env(safe-area-inset-top) + 62px) 0 calc(env(safe-area-inset-bottom) + 78px)}
.tab{display:none;padding:14px 16px;animation:fadein .18s ease}
.tab.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- bottom nav ---------- */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:900;
  display:flex;justify-content:space-around;
  padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);
  background:rgba(11,14,20,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
}
nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:11px;font-weight:600;color:var(--muted);padding:6px 0;border-radius:12px;
  transition:color .15s;
}
nav button.active{color:var(--accent-light)}
nav button svg{width:23px;height:23px}

/* ---------- cards ---------- */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;
}
.card h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-label{
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin:18px 2px 8px;display:flex;justify-content:space-between;align-items:center;
}
.section-label button{color:var(--accent-light);font-size:12px;font-weight:700;letter-spacing:0;text-transform:none}
.kv{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:14px}
.kv .k{color:var(--muted);flex:none}
.kv .v{text-align:right;word-break:break-word;font-weight:500}
.chip{
  display:inline-flex;align-items:center;gap:5px;background:var(--accent-dim);
  color:var(--accent-light);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600;
  white-space:nowrap;flex:none;
}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:26px 10px;line-height:1.5}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--accent);color:#fff;font-weight:700;font-size:15px;
  border-radius:12px;padding:12px 18px;width:100%;transition:opacity .15s;
}
.btn:active{opacity:.8}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn.small{width:auto;padding:8px 14px;font-size:13px;border-radius:10px}
.icon-btn{padding:6px;border-radius:8px;color:var(--muted);display:inline-flex}
.row{display:flex;gap:10px;align-items:center}

/* ---------- home ---------- */
#countdown{
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  background:linear-gradient(135deg,var(--accent) 0%,#33507e 100%);
  color:#fff;position:relative;overflow:hidden;
}
#countdown .big{font-size:26px;font-weight:800;letter-spacing:-.5px}
#countdown .sub{font-size:13px;opacity:.85;margin-top:2px;font-weight:500}
#goldenRow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
#goldenRow::-webkit-scrollbar{display:none}
#mapWrap{position:relative}
#map{
  height:44vh;min-height:300px;border-radius:var(--radius);
  border:1px solid var(--border);z-index:1;
}
.map-toggle{
  position:absolute;top:10px;right:10px;z-index:600;
  background:rgba(19,24,38,.92);border:1px solid var(--border);border-radius:10px;
  padding:7px 11px;font-size:12.5px;font-weight:700;color:var(--text);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.photo-grid img{
  width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;
  border:1px solid var(--border);background:var(--surface-2);
}
.leaflet-container{background:#0b0e14;font-family:var(--font)}
.pin-dot{
  width:30px;height:30px;border-radius:50% 50% 50% 4px;transform:rotate(-45deg);
  background:var(--accent);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);
  display:grid;place-items:center;
}
.pin-dot span{transform:rotate(45deg);font-size:13px}
.pin-dot.base{background:#d9a55f}
.pin-dot.done{background:#3a4763;opacity:.75}
.leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border-radius:12px;border:1px solid var(--border)}
.leaflet-popup-tip{background:var(--surface)}
.leaflet-popup-content{margin:12px 14px;font-size:14px;line-height:1.45}
.popup-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.popup-actions button{font-size:12px;font-weight:700;color:var(--accent-light);padding:4px 0}

.pin-item{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--border)}
.pin-item:last-child{border-bottom:none}
.pin-item .emoji{font-size:19px;flex:none}
.pin-item .info{flex:1;min-width:0}
.pin-item .name{font-size:14.5px;font-weight:600}
.pin-item .name.done{text-decoration:line-through;color:var(--muted)}
.pin-item .note{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wind-chip{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:999px;flex:none}

.day{margin-bottom:10px}
.day .day-head{display:flex;justify-content:space-between;align-items:center;padding:4px 2px}
.day .day-head .d{font-size:14px;font-weight:700}
.day .day-head .d small{color:var(--muted);font-weight:600;margin-left:6px}
.anchor{
  display:flex;gap:10px;align-items:baseline;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-top:6px;font-size:14px;
}
.anchor .t{color:var(--accent-light);font-weight:700;font-size:12.5px;flex:none;min-width:52px}
.anchor .x{margin-left:auto;color:var(--muted);font-size:16px;padding:0 2px}
.day .open-day{color:var(--muted);font-size:13px;padding:8px 2px;font-style:italic}
.add-anchor{color:var(--accent-light);font-size:12.5px;font-weight:700;padding:7px 2px}

/* ---------- explore chat ---------- */
#tab-explore{display:none;padding:0}
#tab-explore.active{display:flex;flex-direction:column;height:calc(100dvh - 62px - 78px - env(safe-area-inset-top) - env(safe-area-inset-bottom) - var(--kb,0px))}
#chatBar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 16px;border-bottom:1px solid var(--border);
}
#chatBar button{color:var(--accent-light);font-size:13px;font-weight:700;padding:4px 0}
.msg strong{font-weight:700}
.msg em{font-style:italic}
.msg code{background:var(--surface-2);border-radius:5px;padding:1px 5px;font-size:13px}
.chat-row{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--border)}
.chat-row:last-child{border-bottom:none}
.chat-row .ct{flex:1;min-width:0;cursor:pointer}
.chat-row .ct .t1{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-row .ct .t2{font-size:12px;color:var(--muted);margin-top:2px}
.chat-row .del{color:var(--muted);font-size:15px;padding:6px}
#chatScroll{flex:1;overflow-y:auto;padding:16px 16px 8px;-webkit-overflow-scrolling:touch}
.msg{max-width:86%;margin-bottom:14px;line-height:1.5;font-size:15px;white-space:pre-wrap;word-break:break-word}
.msg.user{
  margin-left:auto;background:var(--accent);color:#fff;
  border-radius:18px 18px 4px 18px;padding:11px 15px;
}
.msg.assistant{margin-right:auto}
.msg.assistant .bubble{padding:2px 0}
.msg .who{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12.5px;font-weight:700;color:var(--muted)}
.msg .who .avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:11px;color:#fff;font-weight:800}
.sugg-card{
  background:var(--surface);border:1px solid var(--accent);border-radius:14px;
  padding:12px 14px;margin:10px 0;
}
.sugg-card .sn{font-weight:700;font-size:14.5px;display:flex;gap:7px;align-items:center}
.sugg-card .sd{font-size:13px;color:var(--muted);margin:5px 0 10px;line-height:1.45}
.sugg-card .btn{padding:9px 14px;font-size:13.5px}
.sugg-card .added{color:var(--good);font-weight:700;font-size:13.5px;display:flex;gap:6px;align-items:center}
#composer{
  padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;
  background:var(--bg);
}
#chatInput{
  flex:1;border-radius:20px;max-height:110px;resize:none;line-height:1.4;padding:11px 15px;font-size:15px;
}
#sendBtn{
  width:40px;height:40px;flex:none;border-radius:50%;background:var(--accent);color:#fff;
  display:grid;place-items:center;transition:opacity .15s;
}
#sendBtn:disabled{opacity:.4}
.typing{display:inline-flex;gap:4px;padding:6px 2px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
.explore-hint{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none;
}
.explore-hint::-webkit-scrollbar{display:none}
.explore-hint button{
  flex:none;background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:8px 14px;font-size:13px;color:var(--text);font-weight:500;
}

/* ---------- modal / sheet ---------- */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
#overlay.open{display:flex}
#sheet{
  background:var(--surface);width:100%;max-width:560px;max-height:86dvh;overflow-y:auto;
  border-radius:22px 22px 0 0;padding:10px 18px calc(env(safe-area-inset-bottom) + 20px);
  animation:slideup .22s ease;
}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
#sheet .grab{width:38px;height:4px;border-radius:4px;background:var(--border);margin:4px auto 14px}
#sheet h2{font-size:18px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}
.sheet-list button.opt{
  width:100%;display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:12px;
  font-size:15px;font-weight:600;text-align:left;
}
.sheet-list button.opt:active{background:var(--surface-2)}
.sheet-list .opt .sub{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:1px}
.danger{color:var(--bad)!important}

/* ---------- toast & confetti ---------- */
#toast{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 96px);transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:1200;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.4);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-12px;z-index:1300;font-size:18px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9}}

/* sync spinner */
#syncBtn.spin svg{animation:spinsync 1s linear infinite}
@keyframes spinsync{to{transform:rotate(360deg)}}

/* ============================================================
   SMOKE WATCH — wildfire & air quality tab 🔥
   ============================================================ */
#smokeBanner{
  border-radius:var(--radius);padding:16px;margin-bottom:12px;color:#fff;
  background:linear-gradient(135deg,#8a5a2b 0%,#5e3038 100%);position:relative;overflow:hidden;
}
#smokeBanner.decided{background:linear-gradient(135deg,var(--accent) 0%,#33507e 100%)}
#smokeBanner .big{font-size:22px;font-weight:800;letter-spacing:-.4px}
#smokeBanner .sub{font-size:13px;opacity:.88;margin-top:3px;font-weight:500;line-height:1.5}
#smokeBanner .sub button{text-decoration:underline;color:#fff;font-size:13px;font-weight:600}
.aq-hero{display:flex;align-items:center;gap:16px;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:10px}
.aq-num{font-size:46px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.aq-bandlabel{font-size:15.5px;font-weight:700}
.aq-sub{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.aq-row{display:grid;grid-template-columns:88px 1fr 34px 78px;gap:8px;align-items:center;padding:5px 0;font-size:13px}
.aq-town{color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aq-track{height:8px;border-radius:4px;background:var(--surface-2);overflow:hidden}
.aq-fill{display:block;height:100%;border-radius:4px;transition:width .5s ease}
.aq-val{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.aq-cat{font-size:10.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aq-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:10.5px;color:var(--muted);font-weight:600}
.aq-legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}
#aqChart{width:100%;height:auto;display:block}
.alert-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.45}
.alert-item:last-child{border-bottom:none}
.alert-item .sev{flex:none;font-size:10.5px;font-weight:800;letter-spacing:.04em;padding:3px 9px;border-radius:999px;margin-top:1px}
.verdict-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.verdict-conf{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.verdict-call{font-size:12px;font-weight:800;letter-spacing:.07em;padding:6px 13px;border-radius:999px}
.verdict-head{font-size:15.5px;font-weight:700;margin-bottom:6px;line-height:1.4}
.verdict-why{font-size:14px;line-height:1.55}
.verdict-watch{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.5}
.verdict-meta{
  font-size:11.5px;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;
}
.verdict-meta button{color:var(--accent-light);font-weight:700;font-size:11.5px}

/* ============================================================
   DESKTOP — same app, roomier bones (≥900px)
   ============================================================ */
@media (min-width: 900px){
  nav{
    top:calc(env(safe-area-inset-top) + 58px);bottom:0;left:0;right:auto;width:96px;
    flex-direction:column;justify-content:flex-start;gap:10px;
    padding:22px 12px;border-top:none;border-right:1px solid var(--border);
  }
  nav button{flex:none;padding:12px 0;border-radius:14px}
  nav button:hover{color:var(--accent-light);background:var(--surface)}
  main{margin-left:96px}
  .tab{max-width:1180px;margin:0 auto;padding:22px 32px}
  .btn:hover,.trip-switch:hover{filter:brightness(1.12);cursor:pointer}
  .explore-hint button:hover{border-color:var(--accent);cursor:pointer}

  /* Home: map anchored left, lists right */
  #tab-home.active{
    display:grid;column-gap:26px;
    grid-template-columns:minmax(0,1.1fr) minmax(0,0.9fr);
    grid-template-rows:auto auto auto auto auto 1fr;
    grid-template-areas:
      "countdown countdown"
      "golden golden"
      "map shootlabel"
      "map pinlist"
      "map planlabel"
      "map schedule";
    align-items:start;
  }
  #countdown{grid-area:countdown}
  #goldenRow{grid-area:golden}
  #mapWrap{grid-area:map;position:sticky;top:calc(env(safe-area-inset-top) + 80px)}
  #map{height:calc(100dvh - 300px);min-height:520px}
  #shootLabel{grid-area:shootlabel;margin-top:0}
  #pinList{grid-area:pinlist}
  #planLabel{grid-area:planlabel}
  #schedule{grid-area:schedule}

  /* Explore: centered column, Claude-style */
  #tab-explore.active{
    max-width:820px;margin:0 auto;
    height:calc(100dvh - 62px - env(safe-area-inset-top));
    border-left:1px solid var(--border);border-right:1px solid var(--border);
  }

  /* Details: two columns of cards */
  #tab-details{column-count:2;column-gap:26px}
  #tab-details .card,#tab-details .section-label{break-inside:avoid}

  /* sheets become centered modals */
  #overlay{align-items:center;padding:26px}
  #sheet{border-radius:22px;max-height:82dvh}
  #sheet .grab{display:none}

  #diceBtn{bottom:26px}

  /* Smoke Watch: single centered column */
  #tab-smoke{max-width:780px;margin:0 auto}
}

/* dice fab */
#diceBtn{
  position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 92px);z-index:800;
  width:52px;height:52px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
  font-size:23px;display:none;place-items:center;box-shadow:0 4px 18px rgba(0,0,0,.45);
  transition:transform .15s;
}
#diceBtn:active{transform:scale(.9) rotate(20deg)}
#diceBtn.show{display:grid}
</style>
</head>
<body>

<header>
  <div class="logo" id="logoBtn"><div class="mark">R</div>Roamize</div>
  <div class="row" style="gap:6px">
    <button class="icon-btn" id="syncBtn" title="Sync with cloud">

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ============================================================
   ROAMIZE — data layer.
   Everything the app knows lives in one object, saved to
   localStorage. Edit DEFAULT_DATA to change the seed trip,
   or use Settings → Export/Import to move data between devices.
   ============================================================ */
const STORE_KEY = 'roamize.v1';

const DEFAULT_DATA = {
  version: 1,
  settings: { apiKey: '', userName: 'Nathan', logoTaps: 0 },
  activeTripId: 'northshore26',
  trips: [{
    id: 'northshore26',
    name: 'North Shore, MN',
    emoji: '🌲',
    start: '2026-07-27',
    end: '2026-08-01',
    base: { label: 'Airbnb', address: 'Add your Airbnb address in Details', lat: 47.0227, lng: -91.6704 },
    logistics: [
      { id: 'l1', type: 'flight', title: 'Flight out', fields: { Airline: '', 'Flight #': '', Departs: '', Arrives: '', Confirmation: '' }, notes: '' },
      { id: 'l2', type: 'car',    title: 'Rental car', fields: { Company: '', 'Pickup': '', 'Drop-off': '', Confirmation: '' }, notes: '' },
      { id: 'l3', type: 'stay',   title: 'Airbnb', fields: { Address: '', 'Check-in': '', 'Check-out': '', 'Door code': '' }, notes: '' }
    ],
    pins: [
      { id: 'p1', name: 'Split Rock Lighthouse', lat: 47.2003, lng: -91.3673, note: 'Classic North Shore shot — sunrise side light. State park: check drone permit rules.', type: 'shoot', done: false },
      { id: 'p2', name: 'Palisade Head',         lat: 47.3205, lng: -91.2100, note: '350ft cliffs over Superior. Epic drone pullback territory.', type: 'shoot', done: false },
      { id: 'p3', name: 'Tettegouche High Falls', lat: 47.3397, lng: -91.1967, note: 'Tallest falls fully in MN. Short hike in.', type: 'shoot', done: false },
      { id: 'p4', name: 'Gooseberry Falls',      lat: 47.1397, lng: -91.4695, note: 'Multi-tier falls, easy access. Goes early to beat crowds.', type: 'shoot', done: false },
      { id: 'p5', name: 'Aerial Lift Bridge',    lat: 46.7787, lng: -92.0928, note: 'Duluth icon. Time-lapse of a bridge lift + ship entry?', type: 'shoot', done: false },
      { id: 'p6', name: 'Grand Marais Harbor',   lat: 47.7455, lng: -90.3343, note: 'Artsy harbor town. Lighthouse walk + food stop.', type: 'shoot', done: false }
    ],
    schedule: {
      '2026-07-27': [{ id: 'a1', time: '', title: 'Arrive, settle into Airbnb, scout sunset spot' }]
    },
    gear: [
      { name: 'Drone + charged batteries (all of them)', done: false },
      { name: 'ND filters', done: false },
      { name: 'SD cards — formatted', done: false },
      { name: 'Camera + lenses', done: false },
      { name: 'Chargers / power bank', done: false },
      { name: 'Layers — Superior makes its own weather', done: false }
    ]
  }]
};

let DB = load();
function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function save(bump = true) {
  if (bump) DB.updatedAt = Date.now();
  localStorage.setItem(STORE_KEY, JSON.stringify(DB));
}
function trip() { return DB.trips.find(t => t.id === DB.activeTripId) || DB.trips[0]; }
function uid() { return Math.random().toString(36).slice(2, 9); }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- date helpers ---------- */
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDate(d, opts) { return d.toLocaleDateString('en-US', opts || { weekday:'short', month:'short', day:'numeric' }); }
function isoDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function tripDays(t) {
  const out = []; if (!t.start || !t.end) return out;
  let d = parseDate(t.start); const end = parseDate(t.end);
  while (d <= end) { out.push(isoDate(d)); d = new Date(d.getTime() + 86400000); }
  return out;
}
function openDays(t) { return tripDays(t).filter(d => !(t.schedule[d] || []).length); }

/* ---------- toast ---------- */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ---------- sheet (bottom modal) ---------- */
const overlay = document.getElementById('overlay');
const sheetEl = document.getElementById('sheet');
function openSheet(html) {
  sheetEl.innerHTML = '<div class="grab"></div>' + html;
  overlay.classList.add('open');
}
function closeSheet() { overlay.classList.remove('open'); sheetEl.innerHTML = ''; }
overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

/* ============================================================
   SYNC — a private GitHub Gist is the cloud. Free, yours,
   token never leaves this device (secrets are stripped
   from the synced file). Newest copy wins.
   ============================================================ */
async function gh(path, opts = {}) {
  return fetch('https://api.github.com' + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + DB.settings.ghToken, 'Accept': 'application/vnd.github+json', ...(opts.headers || {}) }
  });
}
function syncPayload() {   // never ship secrets to the cloud
  const copy = JSON.parse(JSON.stringify(DB));
  copy.settings.apiKey = ''; copy.settings.ghToken = ''; copy.settings.gistId = '';
  return JSON.stringify(copy);
}
async function findGist() {
  if (DB.settings.gistId) {
    const r = await gh('/gists/' + DB.settings.gistId);
    if (r.ok) return r.json();
    DB.settings.gistId = '';
  }
  const r = await gh('/gists?per_page=100');
  if (!r.ok) throw new Error('token');
  const hit = (await r.json()).find(g => g.files && g.files['roamize.json']);
  if (hit) { DB.settings.gistId = hit.id; save(false); return (await gh('/gists/' + hit.id)).json(); }
  return null;
}
async function syncNow() {
  if (!DB.settings.ghToken) { toast('Add a GitHub token in Settings first'); settingsForm(); return; }
  const btn = document.getElementById('syncBtn'); btn.classList.add('spin');
  try {
    const gist = await findGist();
    if (!gist) {
      const r = await gh('/gists', { method: 'POST', body: JSON.stringify({ description: 'Roamize sync — managed by the app', public: false, files: { 'roamize.json': { content: syncPayload() } } }) });
      if (!r.ok) throw new Error('create');
      DB.settings.gistId = (await r.json()).id; save(false);
      toast('Cloud created · synced ⬆');
    } else {
      const f = gist.files['roamize.json'];
      const content = f.truncated ? await (await fetch(f.raw_url)).text() : f.content;
      const remote = JSON.parse(content);
      const rAt = remote.updatedAt || 0, lAt = DB.updatedAt || 0;
      if (rAt > lAt) {
        if (confirm('Cloud copy is newer (from your other device). Load it here?')) {
          const keep = { apiKey: DB.settings.apiKey, ghToken: DB.settings.ghToken, gistId: DB.settings.gistId };
          DB = remote; DB.settings = { ...remote.settings, ...keep };
          save(false); renderAll(); toast('Pulled latest ⬇');
        }
      } else if (lAt > rAt) {
        const r = await gh('/gists/' + DB.settings.gistId, { method: 'PATCH', body: JSON.stringify({ files: { 'roamize.json': { content: syncPayload() } } }) });
        if (!r.ok) throw new Error('push');
        toast('Pushed to cloud ⬆');
      } else toast('Already in sync ✓');
    }
  } catch (e) { toast('Sync failed — check token & connection'); }
  btn.classList.remove('spin');
}
document.getElementById('syncBtn').addEventListener('click', syncNow);

/* ---------- tabs ---------- */
document.querySelectorAll('nav button').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
function switchTab(name) {
  document.querySelectorAll('nav button').forEach(x => x.classList.toggle('active', x.dataset.tab === name));
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.id === 'tab-' + name));
  document.getElementById('diceBtn').classList.toggle('show', name === 'home');
  if (name === 'home' && MAP) setTimeout(() => MAP.invalidateSize(), 60);
  if (name === 'explore') initExplore();
  if (name === 'smoke') renderSmoke();
}

/* ---------- trip switcher ---------- */
document.getElementById('tripSwitchBtn').addEventListener('click', () => {
  const rows = DB.trips.map(t => `
    <button class="opt" onclick="setTrip('${t.id}')">
      <span style="font-size:22px">${esc(t.emoji)}</span>
      <span>${esc(t.name)}<span class="sub">${fmtDate(parseDate(t.start),{month:'short',day:'numeric'})} – ${fmtDate(parseDate(t.end),{month:'short',day:'numeric'})}</span></span>
      ${t.id === DB.activeTripId ? '<span style="margin-left:auto;color:var(--accent-light)">✓</span>' : ''}
    </button>`).join('');
  openSheet(`<h2>Trips</h2><div class="sheet-list">${rows}
    <button class="opt" onclick="newTripForm()"><span style="font-size:22px">＋</span><span>New trip</span></button>
    <button class="opt" onclick="settingsForm()"><span style="font-size:22px">⚙️</span><span>Settings</span></button>
  </div>`);
});
function setTrip(id) { DB.activeTripId = id; save(); closeSheet(); renderAll(); }
function newTripForm() {
  openSheet(`<h2>New trip</h2>
    <div class="field"><label>Name</label><input id="ntName" placeholder="Moab, UT"></div>
    <div class="field"><label>Emoji</label><input id="ntEmoji" placeholder="🏜️" maxlength="4"></div>
    <div class="field-row">
      <div class="field"><label>Start</label><input id="ntStart" type="date"></div>
      <div class="field"><label>End</label><input id="ntEnd" type="date"></div>
    </div>
    <button class="btn" onclick="createTrip()">Create trip</button>`);
}
function createTrip() {
  const name = document.getElementById('ntName').value.trim();
  const start = document.getElementById('ntStart').value, end = document.getElementById('ntEnd').value;
  if (!name || !start || !end) return toast('Name and dates required');
  const t = {
    id: uid(), name, emoji: document.getElementById('ntEmoji').value.trim() || '📍',
    start, end,
    base: { label: 'Home base', address: '', lat: 44.9778, lng: -93.2650 },
    logistics: [
      { id: uid(), type: 'flight', title: 'Flight out', fields: { Airline:'', 'Flight #':'', Departs:'', Arrives:'', Confirmation:'' }, notes: '' },
      { id: uid(), type: 'car', title: 'Rental car', fields: { Company:'', Pickup:'', 'Drop-off':'', Confirmation:'' }, notes: '' },
      { id: uid(), type: 'stay', title: 'Stay', fields: { Address:'', 'Check-in':'', 'Check-out':'' }, notes: '' }
    ],
    pins: [], schedule: {}, gear: []
  };
  DB.trips.push(t); DB.activeTripId = t.id; save(); closeSheet(); renderAll();
  toast('Trip created — drop some pins 📍');
}
function deleteTrip(id) {
  if (DB.trips.length <= 1) return toast("Can't delete your only trip");
  if (!confirm('Delete this trip and everything in it?')) return;
  DB.trips = DB.trips.filter(t => t.id !== id);
  DB.activeTripId = DB.trips[0].id; save(); closeSheet(); renderAll();
}

/* ---------- settings ---------- */
function settingsForm() {
  openSheet(`<h2>Settings</h2>
    <div class="field"><label>Anthropic API key (stays on this device)</label>
      <input id="setKey" type="password" placeholder="sk-ant-…" value="${esc(DB.settings.apiKey)}"></div>
    <div class="field"><label>Scout's personality (blank = default)</label>
      <textarea id="setPersona" rows="6" placeholder="${esc(DEFAULT_PERSONA)}">${esc(DB.settings.persona || '')}</textarea></div>
    <div class="field"><label>GitHub token — powers the sync button</label>
      <input id="setGh" type="password" placeholder="ghp_… (classic token, gist scope only)" value="${esc(DB.settings.ghToken || '')}"></div>
    <p style="font-size:12px;color:var(--muted);margin:-6px 0 12px;line-height:1.5">github.com → Settings → Developer settings → Personal access tokens → Generate new (classic) → check only <b>gist</b> → paste here on every device you want synced. Your keys are never uploaded.</p>
    <button class="btn" onclick="saveSettings()">Save</button>
    <div style="height:14px"></div>
    <button class="btn ghost" onclick="exportData()">Export trip data (JSON)</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="document.getElementById('impFile').click()">Import trip data</button>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)">
    <div style="height:10px"></div>
    <button class="btn ghost danger" onclick="deleteTrip('${trip().id}')">Delete current trip</button>
    <p style="font-size:12px;color:var(--muted);margin-top:16px;text-align:center">Roamize v1 · built with Claude · data lives in your browser</p>`);
}
function saveSettings() {
  DB.settings.apiKey = document.getElementById('setKey').value.trim();
  DB.settings.persona = document.getElementById('setPersona').value.trim();
  DB.settings.ghToken = document.getElementById('setGh').value.trim();
  save(); closeSheet(); toast('Saved');
}
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'roamize-backup.json'; a.click();
}
function importData(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try { const d = JSON.parse(r.result); if (!d.trips) throw 0; DB = d; save(); closeSheet(); renderAll(); toast('Imported ✓'); }
    catch (e) { toast('Not a valid Roamize backup'); }
  };
  r.readAsText(f);
}

/* ============================================================
   DETAILS TAB — logistics cards
   ============================================================ */
const TYPE_ICON = { flight: '✈️', car: '🚗', stay: '🏠', other: '📎' };
function renderDetails() {
  const t = trip();
  const cards = t.logistics.map(l => {
    const rows = Object.entries(l.fields).filter(([k,v]) => v)
      .map(([k,v]) => `<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('');
    return `<div class="card">
      <h3><span>${TYPE_ICON[l.type] || '📎'}</span>${esc(l.title)}
        <button class="icon-btn" style="margin-left:auto" onclick="editLogistics('${l.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 1 1 4 4L7 21l-4 1 1-4z"/></svg>
        </button></h3>
      ${rows || '<div class="empty" style="padding:12px">Tap ✎ to fill in</div>'}
      ${l.notes ? `<div style="font-size:13px;color:var(--muted);margin-top:8px;line-height:1.45">${esc(l.notes)}</div>` : ''}
    </div>`;
  }).join('');

  const gear = (t.gear || []).map((g, i) => `
    <div class="pin-item" onclick="toggleGear(${i})" style="cursor:pointer">
      <span class="emoji">${g.done ? '✅' : '⬜️'}</span>
      <div class="info"><div class="name ${g.done ? 'done' : ''}">${esc(g.name)}</div></div>
    </div>`).join('');

  document.getElementById('tab-details').innerHTML = `
    <div class="section-label">Trip dates</div>
    <div class="card">
      <div class="kv"><span class="k">Trip</span><span class="v">${esc(t.emoji)} ${esc(t.name)}</span></div>
      <div class="kv"><span class="k">Dates</span><span class="v">${fmtDate(parseDate(t.start))} → ${fmtDate(parseDate(t.end))}</span></div>
      <div class="kv"><span class="k">Nights</span><span class="v">${tripDays(t).length - 1}</span></div>
      <div style="margin-top:8px"><button class="btn ghost small" onclick="editTripForm()">Edit trip</button></div>
    </div>
    <div class="section-label">Logistics <button onclick="addLogisticsForm()">+ Add</button></div>
    ${cards}
    <div class="section-label">Home base</div>
    <div class="card">
      <div class="kv"><span class="k">Label</span><span class="v">${esc(t.base.label)}</span></div>
      <div class="kv"><span class="k">Address</span><span class="v">${esc(t.base.address) || '—'}</span></div>
      <div style="margin-top:8px"><button class="btn ghost small" onclick="editBaseForm()">Edit home base</button></div>
    </div>
    ${t.gear && t.gear.length ? `<div class="section-label">Gear check <button onclick="addGearForm()">+ Add</button></div><div class="card">${gear}</div>` : ''}
  `;
}
function toggleGear(i) { trip().gear[i].done = !trip().gear[i].done; save(); renderDetails();
  if (trip().gear.every(g => g.done)) { confettiBurst(); toast('Gear locked. Go make something great 🎬'); } }
function addGearForm() {
  const name = prompt('Add gear item:'); if (!name) return;
  trip().gear.push({ name, done: false }); save(); renderDetails();
}
function editTripForm() {
  const t = trip();
  openSheet(`<h2>Edit trip</h2>
    <div class="field"><label>Name</label><input id="etName" value="${esc(t.name)}"></div>
    <div class="field"><label>Emoji</label><input id="etEmoji" value="${esc(t.emoji)}" maxlength="4"></div>
    <div class="field-row">
      <div class="field"><label>Start</label><input id="etStart" type="date" value="${t.start}"></div>
      <div class="field"><label>End</label><input id="etEnd" type="date" value="${t.end}"></div>
    </div>
    <button class="btn" onclick="saveTripEdit()">Save</button>`);
}
function saveTripEdit() {
  const t = trip();
  t.name = document.getElementById('etName').value.trim() || t.name;
  t.emoji = document.getElementById('etEmoji').value.trim() || t.emoji;
  t.start = document.getElementById('etStart').value || t.start;
  t.end = document.getElementById('etEnd').value || t.end;
  save(); closeSheet(); renderAll();
}
function editBaseForm() {
  const b = trip().base;
  openSheet(`<h2>Home base</h2>
    <div class="field"><label>Label</label><input id="ebLabel" value="${esc(b.label)}"></div>
    <div class="field"><label>Address</label><input id="ebAddr" value="${esc(b.address)}"></div>
    <div class="field-row">
      <div class="field"><label>Latitude</label><input id="ebLat" type="number" step="any" value="${b.lat}"></div>
      <div class="field"><label>Longitude</label><input id="ebLng" type="number" step="any" value="${b.lng}"></div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin:-4px 0 12px">Tip: in Apple/Google Maps, long-press your Airbnb → copy the coordinates.</p>
    <button class="btn" onclick="saveBase()">Save</button>`);
}
function saveBase() {
  const b = trip().base;
  b.label = document.getElementById('ebLabel').value.trim() || b.label;
  b.address = document.getElementById('ebAddr').value.trim();
  b.lat = parseFloat(document.getElementById('ebLat').value) || b.lat;
  b.lng = parseFloat(document.getElementById('ebLng').value) || b.lng;
  save(); closeSheet(); renderAll();
}
function addLogisticsForm() {
  openSheet(`<h2>Add logistics</h2>
    <div class="field"><label>Type</label>
      <select id="alType"><option value="flight">✈️ Flight</option><option value="car">🚗 Rental car</option><option value="stay">🏠 Stay</option><option value="other">📎 Other</option></select></div>
    <div class="field"><label>Title</label><input id="alTitle" placeholder="Return flight"></div>
    <button class="btn" onclick="createLogistics()">Add</button>`);
}
function createLogistics() {
  const type = document.getElementById('alType').value;
  const title = document.getElementById('alTitle').value.trim() || 'Untitled';
  const fields = type === 'flight' ? { Airline:'', 'Flight #':'', Departs:'', Arrives:'', Confirmation:'' }

let MAP = null, MARKERS = [], STYLE_LAYERS = [];

/* ---------- map styles: hybrid (satellite + labels) & dark ---------- */
const MAP_STYLES = {
  hybrid: () => [
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 })
  ],
  dark: () => [
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 })
  ]
};
function mapStyle() { return DB.settings.mapStyle || 'hybrid'; }
function applyMapStyle() {
  STYLE_LAYERS.forEach(l => MAP.removeLayer(l));
  STYLE_LAYERS = MAP_STYLES[mapStyle()]().map(l => l.addTo(MAP));
  const btn = document.getElementById('mapStyleBtn');
  btn.textContent = mapStyle() === 'hybrid' ? '🌑 Dark' : '🛰️ Hybrid';
}
document.getElementById('mapStyleBtn').addEventListener('click', () => {
  DB.settings.mapStyle = mapStyle() === 'hybrid' ? 'dark' : 'hybrid';
  save(); applyMapStyle();
});

function renderCountdown() {
  const t = trip();
  const now = new Date(); now.setHours(0,0,0,0);
  const start = parseDate(t.start), end = parseDate(t.end);
  const days = Math.round((start - now) / 86400000);
  let big, sub;
  if (days > 1) { big = `T-minus ${days} days`; sub = `${t.emoji} ${t.name} · ${fmtDate(start)}`; }
  else if (days === 1) { big = 'Tomorrow.'; sub = 'Charge every battery you own 🔋'; }
  else if (now >= start && now <= end) {
    const dayNum = Math.round((now - start) / 86400000) + 1;
    big = `Day ${dayNum} of ${tripDays(t).length}`; sub = 'You’re out there. Go get the shot.';
  } else if (now > end) { big = 'Trip wrapped 🎬'; sub = `${trip().pins.filter(p=>p.done).length}/${trip().pins.length} spots shot`; }
  else { big = 'Go time.'; sub = t.name; }
  document.getElementById('countdown').innerHTML = `<div class="big">${big}</div><div class="sub">${esc(sub)}</div>`;
}

function pinIcon(p, isBase) {
  return L.divIcon({
    className: '', iconSize: [30, 30], iconAnchor: [15, 28], popupAnchor: [0, -26],
    html: `<div class="pin-dot ${isBase ? 'base' : (p && p.done ? 'done' : '')}"><span>${isBase ? '🏠' : (p && p.done ? '✓' : '📷')}</span></div>`
  });
}
function renderMap() {
  const t = trip();
  if (!MAP) {
    MAP = L.map('map', { zoomControl: false, attributionControl: false });
    applyMapStyle();
    L.control.attribution({ prefix: '© Esri · OSM · CARTO' }).addTo(MAP);
    MAP.on('contextmenu', e => quickAddPin(e.latlng)); // long-press on mobile
  }
  MARKERS.forEach(m => MAP.removeLayer(m)); MARKERS = [];
  const pts = [];
  const baseM = L.marker([t.base.lat, t.base.lng], { icon: pinIcon(null, true) }).addTo(MAP)
    .bindPopup(`<b>🏠 ${esc(t.base.label)}</b><br><span style="color:var(--muted);font-size:12.5px">${esc(t.base.address) || 'Set address in Details'}</span>`);
  MARKERS.push(baseM); pts.push([t.base.lat, t.base.lng]);
  t.pins.forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: pinIcon(p) }).addTo(MAP).bindPopup(popupHtml(p));
    MARKERS.push(m); pts.push([p.lat, p.lng]);
  });
  if (pts.length > 1) MAP.fitBounds(pts, { padding: [36, 36] });
  else MAP.setView(pts[0] || [46.78, -92.1], 9);
}
function popupHtml(p) {
  const dist = haversine(trip().base, p);
  return `<b>${esc(p.name)}</b><br>
    <span style="color:#8b95ab;font-size:12.5px">${esc(p.note || '')}${p.note ? '<br>' : ''}${dist} from base</span>

}

/* ---------- 📸 Peek: real photos near a pin (Wikimedia Commons, free) ---------- */
const photoCache = {};
async function peekPhotos(pinId) {
  const p = trip().pins.find(x => x.id === pinId); if (!p) return;
  const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${p.lat},${p.lng}`;
  openSheet(`<h2>📸 ${esc(p.name)}</h2>
    <div class="photo-grid" id="peekGrid"><div class="empty" style="grid-column:1/-1">Finding real shots of this spot…</div></div>
    <button class="btn ghost" onclick="window.open('${svUrl}','_blank')">👁 Open Street View</button>
    <p style="font-size:11.5px;color:var(--muted);text-align:center;margin-top:10px">Photos: Wikimedia Commons, shot near these coordinates · tap to view full-size</p>`);
  const key = pinId;
  try {
    let photos = photoCache[key];
    if (!photos) {
      const url = 'https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*' +
        '&generator=geosearch&ggsnamespace=6&ggslimit=10&ggsradius=2500' +
        `&ggscoord=${p.lat}%7C${p.lng}` +
        '&prop=imageinfo&iiprop=url&iiurlwidth=640';
      const res = await fetch(url); const data = await res.json();
      photos = Object.values(data.query?.pages || {})
        .map(pg => pg.imageinfo && pg.imageinfo[0])
        .filter(ii => ii && /\.(jpe?g|png)$/i.test(ii.url))
        .slice(0, 4);
      photoCache[key] = photos;
    }
    const grid = document.getElementById('peekGrid'); if (!grid) return;
    grid.innerHTML = photos.length
      ? photos.map(ii => `<img src="${ii.thumburl}" loading="lazy" onclick="window.open('${ii.url}','_blank')">`).join('')
      : `<div class="empty" style="grid-column:1/-1">No public photos within ~1.5 mi of this pin.<br>Street View is your friend here 👁</div>`;
  } catch (e) {
    const grid = document.getElementById('peekGrid');
    if (grid) grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Couldn\'t load photos right now.</div>';
  }
}
function navTo(lat, lng) { window.open(`https://maps.apple.com/?daddr=${lat},${lng}`, '_blank'); }
function haversineMi(a, b) {
  const R = 3958.8, toR = x => x * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
  const h = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function haversine(a, b) {
  const mi = haversineMi(a, b);
  return mi < 1 ? '< 1 mi' : Math.round(mi) + ' mi';
}

/* ============================================================
   WEATHER + GOLDEN HOUR — Open-Meteo, free, no key 🌤️
   ============================================================ */
const wxCache = {};
async function fetchWx(lat, lng) {
  const key = lat.toFixed(2) + ',' + lng.toFixed(2);
  if (wxCache[key] && Date.now() - wxCache[key].at < 30 * 60 * 1000) return wxCache[key].data;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
    `&current=wind_speed_10m,wind_gusts_10m,cloud_cover,temperature_2m,precipitation` +
    `&daily=sunrise,sunset&wind_speed_unit=mph&temperature_unit=fahrenheit&timezone=auto&forecast_days=2`;
  const res = await fetch(url); const data = await res.json();
  wxCache[key] = { at: Date.now(), data };
  return data;
}
function windVerdict(mph, gust) {
  if (mph <= 11 && gust <= 17) return { label: mph.toFixed(0) + ' mph', bg: 'rgba(95,185,138,.18)', fg: 'var(--good)', word: 'Send it 🚁' };
  if (mph <= 18 && gust <= 25) return { label: mph.toFixed(0) + ' mph', bg: 'rgba(217,165,95,.18)', fg: 'var(--warn)', word: 'Flyable, stay sharp' };
  return { label: mph.toFixed(0) + ' mph', bg: 'rgba(217,107,107,.18)', fg: 'var(--bad)', word: 'Keep it grounded' };
}
async function loadWindChips() {
  for (const p of trip().pins) {
    const el = document.getElementById('wind-' + p.id); if (!el) continue;
    try {
      const wx = await fetchWx(p.lat, p.lng);
      const v = windVerdict(wx.current.wind_speed_10m, wx.current.wind_gusts_10m);
      el.textContent = '🌬 ' + v.label; el.style.background = v.bg; el.style.color = v.fg;
    } catch (e) { el.textContent = ''; }
  }
}
async function renderGolden() {
  const row = document.getElementById('goldenRow');
  try {
    const b = trip().base;
    const wx = await fetchWx(b.lat, b.lng);
    const sr = new Date(wx.daily.sunrise[0]), ss = new Date(wx.daily.sunset[0]);
    const fmt = d => d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const gStart = new Date(ss.getTime() - 55 * 60000);
    const v = windVerdict(wx.current.wind_speed_10m, wx.current.wind_gusts_10m);
    row.innerHTML = `
      <span class="chip">🌅 ${fmt(sr)}</span>
      <span class="chip">✨ Golden hr ${fmt(gStart)}</span>
      <span class="chip">🌇 ${fmt(ss)}</span>
      <span class="chip" style="background:${v.bg};color:${v.fg}">🚁 ${v.word}</span>
      <span class="chip">☁️ ${wx.current.cloud_cover}% · ${Math.round(wx.current.temperature_2m)}°</span>`;
  } catch (e) { row.innerHTML = ''; }
}
async function droneCheck(pinId) {
  const p = trip().pins.find(x => x.id === pinId); if (!p) return;
  try {
    const wx = await fetchWx(p.lat, p.lng);
    const v = windVerdict(wx.current.wind_speed_10m, wx.current.wind_gusts_10m);
    openSheet(`<h2>🚁 ${esc(p.name)}</h2>
      <div class="card" style="margin-bottom:10px">
        <div class="kv"><span class="k">Wind</span><span class="v" style="color:${v.fg}">${wx.current.wind_speed_10m.toFixed(0)} mph, gusting ${wx.current.wind_gusts_10m.toFixed(0)}</span></div>
        <div class="kv"><span class="k">Verdict</span><span class="v" style="color:${v.fg};font-weight:700">${v.word}</span></div>
        <div class="kv"><span class="k">Cloud cover</span><span class="v">${wx.current.cloud_cover}%</span></div>
        <div class="kv"><span class="k">Temp</span><span class="v">${Math.round(wx.current.temperature_2m)}°F</span></div>
        <div class="kv"><span class="k">Precip</span><span class="v">${wx.current.precipitation}"</span></div>
        <div class="kv"><span class="k">Sunset</span><span class="v">${new Date(wx.daily.sunset[0]).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span></div>
      </div>
      <p style="font-size:12px;color:var(--muted);text-align:center">Live from Open-Meteo · always check B4UFLY for airspace</p>`);

function confettiBurst() {
  const bits = ['🎉','✨','🎊','📸','🚁','🌲'];
  for (let i = 0; i < 26; i++) {
    const s = document.createElement('span');
    s.className = 'confetti'; s.textContent = bits[i % bits.length];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (1.6 + Math.random() * 1.6) + 's';
    s.style.animationDelay = (Math.random() * .5) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 4000);
  }
}

function rollAnchor(pinId) {
  const p = trip().pins.find(x => x.id === pinId); if (!p) return;
  const today = isoDate(new Date());

}

Quirk: occasionally drops a filmmaking phrase ("we lose the light at 8:57")`;
let CURRENT_CHAT = null;                     // {id, title, at, messages:[{role,content}]}

let SENDING = false;

/* chats are saved per-trip, so history survives app switches & restarts */
function chats() { const t = trip(); return t.chats = t.chats || []; }
function persistChat() {
  if (!CURRENT_CHAT || !CURRENT_CHAT.messages.length) return;
  const list = chats();
  if (!list.some(c => c.id === CURRENT_CHAT.id)) list.unshift(CURRENT_CHAT);
  CURRENT_CHAT.at = Date.now();
  save();
}

function memory() { const t = trip(); return t.memory = t.memory || []; }

function systemPrompt() {
  const t = trip();
  const mem = memory().map(m => '- ' + m).join('\n') || '(nothing yet)';
  const open = openDays(t).map(d => fmtDate(parseDate(d), { weekday: 'long', month: 'short', day: 'numeric' })).join(', ') || 'none — every day has at least one anchor';
  const pins = t.pins.map(p => `- ${p.name} (${p.lat.toFixed(4)}, ${p.lng.toFixed(4)})${p.done ? ' [already shot]' : ''}${p.note ? ' — ' + p.note : ''}`).join('\n') || '(no pins yet)';
  const sched = tripDays(t).map(d => {
    const a = (t.schedule[d] || []).map(x => (x.time ? x.time + ' ' : '') + x.title).join('; ');
    return `- ${fmtDate(parseDate(d), { weekday: 'short', month: 'short', day: 'numeric' })}: ${a || 'OPEN'}`;
  }).join('\n');
  return `You are Scout, the built-in travel scout inside Roamize — ${DB.settings.userName}'s personal trip app. He's a photographer/droner shooting solo content. Be concise and useful; short conversational paragraphs.

YOUR PERSONALITY:
${DB.settings.persona || DEFAULT_PERSONA}

CURRENT TRIP: ${t.emoji} ${t.name}, ${t.start} to ${t.end}.
HOME BASE: ${t.base.label}${t.base.address ? ' at ' + t.base.address : ''} (${t.base.lat}, ${t.base.lng}).
OPEN DAYS (unscheduled): ${open}
SHOOT LIST:\n${pins}
SCHEDULE:\n${sched}
MEMORY (things Nathan told you to remember — from past chats too):\n${mem}

He wants a loose trip — suggest, don't over-schedule. Prioritize photogenic and drone-friendly places near base, golden-hour timing, realistic drive times. Flag drone restrictions when relevant (national parks = no, MN state parks need permits).

FORMATTING: plain conversational text only. Never use markdown — no asterisks for bold/italic, no headers, no bullet symbols. This renders in a chat bubble, not a document.

IMPORTANT — when you recommend one or more specific places worth adding to his map, ALSO append one fenced code block per place, exactly like:
\`\`\`suggestion
{"name":"Place Name","lat":47.1234,"lng":-91.1234,"note":"one-line why + shot idea","date":"2026-07-28","time":"6:00 PM"}
\`\`\`
lat/lng must be your best real coordinates. "date" (a trip date, prefer OPEN days) and "time" are optional — include them only when suggesting a specific day. Don't mention the code block in your prose; the app turns it into an Add button.

MEMORY WRITES — you CAN remember things across chats. When Nathan shares a lasting preference, fact, or decision worth keeping (e.g. "I hate crowds before 9 AM", "sunset over sunrise", "bringing the ND filters"), append a fenced block:
\`\`\`memory
{"note":"short single fact, max ~15 words"}
\`\`\`
The app saves it permanently and it will appear in your MEMORY section in every future chat. Use it sparingly — durable facts only, not small talk. If he explicitly says to remember something, always write it. Don't mention the block in prose; the app shows a confirmation.`;
}

function addBubble(role, text) {
  const scroll = document.getElementById('chatScroll');
  const div = document.createElement('div');

  if (role === 'assistant') {
    div.innerHTML = `<div class="who"><span class="avatar">✦</span>Scout</div><div class="bubble"></div>`;
    renderAssistantContent(div.querySelector('.bubble'), text);

  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
  return div;
}

/* light markdown: renders **bold**, *italic*, `code` properly instead of raw asterisks */
function mdLite(s) {
  let h = esc(s);
  h = h.replace(/^#{1,4}\s+(.+)$/gm, '<strong>$1</strong>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  return h;
}

/* parse ```suggestion and ```memory blocks into cards */
function renderAssistantContent(el, text) {
  const re = /```(suggestion|memory)\s*([\s\S]*?)```/g;
  let last = 0, m;
  const frag = document.createDocumentFragment();
  function pushText(s) { if (s.trim()) { const p = document.createElement('div'); p.innerHTML = mdLite(s.trim()); p.style.whiteSpace = 'pre-wrap'; frag.appendChild(p); } }
  while ((m = re.exec(text))) {
    pushText(text.slice(last, m.index));
    if (m[1] === 'memory') {
      try {
        const note = JSON.parse(m[2]).note;
        if (note && !memory().includes(note)) { memory().push(note); save(); }
        const chipEl = document.createElement('div');
        chipEl.className = 'sugg-card';
        chipEl.style.borderColor = 'var(--border)';
        chipEl.innerHTML = `<div class="added">🧠 Remembered: <span style="color:var(--text);font-weight:500">${esc(note)}</span></div>`;
        frag.appendChild(chipEl);
      } catch (e) {}
      last = m.index + m[0].length;
      continue;
    }
    try {
      const s = JSON.parse(m[2]);
      const card = document.createElement('div');
      card.className = 'sugg-card';
      card.innerHTML = `<div class="sn">📍 ${esc(s.name)}</div>
        <div class="sd">${esc(s.note || '')}${s.date ? `<br>Suggested: ${esc(s.date)}${s.time ? ' · ' + esc(s.time) : ''}` : ''}</div>`;
      const btn = document.createElement('button');
      btn.className = 'btn small'; btn.textContent = '+ Add to trip';
      btn.onclick = () => {
        trip().pins.push({ id: uid(), name: s.name, lat: +s.lat, lng: +s.lng, note: s.note || '', type: 'shoot', done: false });
        if (s.date && tripDays(trip()).includes(s.date)) {
          (trip().schedule[s.date] = trip().schedule[s.date] || []).push({ id: uid(), title: s.name, time: s.time || '' });
        }
        save(); renderHome();
        btn.replaceWith(Object.assign(document.createElement('div'), { className: 'added', textContent: '✓ On the map' }));
        toast('Added to Home 📍');
      };
      card.appendChild(btn);
      frag.appendChild(card);
    } catch (e) { pushText(m[0]); }
    last = m.index + m[0].length;
  }
  pushText(text.slice(last));
  el.innerHTML = ''; el.appendChild(frag);
}

async function sendChat(preset) {
  if (SENDING) return;
  const input = document.getElementById('chatInput');
  const text = (preset || input.value).trim();
  if (!text) return;
  if (!DB.settings.apiKey) { addBubble('user', text); addBubble('assistant', 'Add your API key in Settings first — then I\'m all yours.'); input.value = ''; return; }
  input.value = ''; input.style.height = 'auto';
  addBubble('user', text);
  if (!CURRENT_CHAT) newChat();
  CURRENT_CHAT.messages.push({ role: 'user', content: text });
  if (!CURRENT_CHAT.title) CURRENT_CHAT.title = text.slice(0, 48);
  persistChat();

  const scroll = document.getElementById('chatScroll');
  const thinking = document.createElement('div');
  thinking.className = 'msg assistant';
  thinking.innerHTML = `<div class="who"><span class="avatar">✦</span>Scout</div><div class="typing"><i></i><i></i><i></i></div>`;
  scroll.appendChild(thinking); scroll.scrollTop = scroll.scrollHeight;

  SENDING = true; document.getElementById('sendBtn').disabled = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': DB.settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: EXPLORE_MODEL,
        max_tokens: 1200,
        system: systemPrompt(),
        messages: CURRENT_CHAT.messages.slice(-16)   // keep context light = cheap
      })
    });
    const data = await res.json();
    thinking.remove();
    if (data.error) {
      addBubble('assistant', 'API hiccup: ' + (data.error.message || 'unknown error') + (res.status === 401 ? '\n\nDouble-check your key in Settings.' : ''));
    } else {
      const reply = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
      CURRENT_CHAT.messages.push({ role: 'assistant', content: reply });
      persistChat();
      addBubble('assistant', reply);
    }
  } catch (e) {
    thinking.remove();
    addBubble('assistant', 'Couldn\'t reach the API — check your connection and try again.');
  }
  SENDING = false; document.getElementById('sendBtn').disabled = false;
}
document.getElementById('sendBtn').addEventListener('click', () => sendChat());
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.getElementById('chatInput').addEventListener('input', function () {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

/* ---------- keep composer above the iOS keyboard ---------- */
if (window.visualViewport) {
  let vvTimer;
  const vvFix = () => {
    clearTimeout(vvTimer);
    vvTimer = setTimeout(() => {
      // ONLY intervene while typing in the Explore chat — everywhere else
      // (Settings sheet, pin forms, etc.) let iOS handle the keyboard natively.
      const chatFocused = document.activeElement === document.getElementById('chatInput')
        && document.getElementById('tab-explore').classList.contains('active');
      const vv = window.visualViewport;
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      if (chatFocused && kb > 0) {
        document.documentElement.style.setProperty('--kb', kb + 'px');
        window.scrollTo(0, 0);   // stop Safari from panning the whole app
        const sc = document.getElementById('chatScroll');
        sc.scrollTop = sc.scrollHeight;
      } else {
        document.documentElement.style.setProperty('--kb', '0px');
      }
    }, 60);
  };
  window.visualViewport.addEventListener('resize', vvFix);
  window.visualViewport.addEventListener('scroll', vvFix);
  document.getElementById('chatInput').addEventListener('blur', () =>
    setTimeout(() => document.documentElement.style.setProperty('--kb', '0px'), 120));
}

/* ============================================================
   SMOKE WATCH 🔥 — live wildfire & air quality intel for the
   North Shore, plus a Sonnet-powered go/no-go verdict.
   Data: Open-Meteo air quality (CAMS), NWS alerts, NIFC fire map.

const SMOKE_DEADLINE = '2026-07-22';           // Airbnb full-refund cutoff
const VERDICT_MODEL  = 'claude-sonnet-4-5';    // judgment call deserves Sonnet; still ~1-2¢
const VERDICT_TTL    = 3 * 60 * 60 * 1000;     // auto-refresh every 3 hours
const CORRIDOR = [                              // Hwy 61 shooting corridor, SW → NE
  { name: 'Duluth',        lat: 46.7867, lng: -92.1005 },
  { name: 'Two Harbors',   lat: 47.0206, lng: -91.6712 },
  { name: 'Silver Bay',    lat: 47.2942, lng: -91.2574 },
  { name: 'Lutsen',        lat: 47.6641, lng: -90.7157 },
  { name: 'Grand Marais',  lat: 47.7455, lng: -90.3343 },
  { name: 'Grand Portage', lat: 47.9635, lng: -89.6848 }
];
function smokeFocus() {
  const b = trip().base;
  return (b && b.lat) ? { name: b.label || 'Home base', lat: b.lat, lng: b.lng } : CORRIDOR[4];
}
function smokeState() {
  const t = trip();
  return t.smokeWatch = t.smokeWatch || { decided: false, decision: '', verdict: null, verdictAt: 0 };
}
function smokeWatchActive() { return !smokeState().decided && isoDate(new Date()) <= SMOKE_DEADLINE; }

/* EPA AQI bands — official categories, colors tuned for the dark theme */
function aqiBand(a) {
  if (a == null || isNaN(a)) return { label: 'No data',        short: '—',      color: '#8b95ab', bg: 'rgba(139,149,171,.14)' };
  if (a <= 50)  return { label: 'Good',                        short: 'Good',   color: '#6cc999', bg: 'rgba(108,201,153,.15)' };
  if (a <= 100) return { label: 'Moderate',                    short: 'Mod',    color: '#f2e276', bg: 'rgba(242,226,118,.13)' };
  if (a <= 150) return { label: 'Unhealthy for sensitive',     short: 'USG',    color: '#e6993f', bg: 'rgba(230,153,63,.16)' };
  if (a <= 200) return { label: 'Unhealthy',                   short: 'Unhlthy',color: '#c74f63', bg: 'rgba(199,79,99,.18)' };
  if (a <= 300) return { label: 'Very unhealthy',              short: 'V.Unh',  color: '#a678dd', bg: 'rgba(166,120,221,.18)' };
  return { label: 'Hazardous',                                 short: 'Hazrd',  color: '#b04562', bg: 'rgba(176,69,98,.2)' };
}

/* ---------- data fetchers (all free, no keys) ---------- */
const aqCache = {};
async function fetchAQ(lat, lng) {
  const key = lat.toFixed(2) + ',' + lng.toFixed(2);
  if (aqCache[key] && Date.now() - aqCache[key].at < 30 * 60 * 1000) return aqCache[key].data;
  const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}` +
    `&current=us_aqi,pm2_5&hourly=us_aqi,pm2_5&forecast_days=7&timezone=auto`;
  const res = await fetch(url); const data = await res.json();
  if (data.error) throw new Error(data.reason || 'AQ error');
  aqCache[key] = { at: Date.now(), data };
  return data;
}
function dailyMax(aq) {
  const times = aq.hourly?.time || [], vals = aq.hourly?.us_aqi || [], map = {};
  times.forEach((tm, i) => {
    const d = tm.slice(0, 10), v = vals[i];
    if (v == null) return;
    map[d] = map[d] || { date: d, max: 0, sum: 0, n: 0 };
    map[d].max = Math.max(map[d].max, v); map[d].sum += v; map[d].n++;
  });
  return Object.values(map).map(x => ({ date: x.date, max: Math.round(x.max), avg: Math.round(x.sum / x.n) }))
    .sort((a, b) => a.date < b.date ? -1 : 1);
}
async function fetchAlerts() {
  const f = smokeFocus();
  const res = await fetch(`https://api.weather.gov/alerts/active?point=${f.lat},${f.lng}`, { headers: { 'Accept': 'application/geo+json' } });
  const data = await res.json();
  return (data.features || []).map(x => ({
    event: x.properties.event, severity: x.properties.severity, headline: x.properties.headline || ''
  }));
}
async function fetchFires() {
  const base = 'https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_Current/FeatureServer/0/query';
  const params = new URLSearchParams({
    where: "IncidentTypeCategory='WF'",
    geometry: JSON.stringify({ xmin: -94.5, ymin: 45.8, xmax: -88.0, ymax: 49.4, spatialReference: { wkid: 4326 } }),
    geometryType: 'esriGeometryEnvelope', inSR: '4326', spatialRel: 'esriSpatialRelIntersects',
    outFields: 'IncidentName,IncidentSize,PercentContained,FireDiscoveryDateTime',
    returnGeometry: 'true', outSR: '4326', f: 'json'
  });
  const res = await fetch(base + '?' + params);
  const data = await res.json();
  if (data.error) throw new Error('fire map error');
  const f = smokeFocus();
  return (data.features || []).map(x => ({
    name: x.attributes.IncidentName,
    acres: x.attributes.IncidentSize,
    contained: x.attributes.PercentContained,
    found: x.attributes.FireDiscoveryDateTime,
    mi: x.geometry ? Math.round(haversineMi(f, { lat: x.geometry.y, lng: x.geometry.x })) : null
  })).filter(x => x.name).sort((a, b) => (a.mi ?? 9e9) - (b.mi ?? 9e9));
}

/* ---------- render ---------- */
let SMOKE_DATA = null;
function renderSmoke() {

      Air quality: Open-Meteo/CAMS (fire.airnow.gov equivalent) · Alerts: weather.gov · Fires: NIFC national map.<br>

async function loadSmoke() {
  const focus = smokeFocus();
  const [corrRes, focusRes, alertsRes, firesRes] = await Promise.all([
    Promise.allSettled(CORRIDOR.map(p => fetchAQ(p.lat, p.lng))),
    fetchAQ(focus.lat, focus.lng).catch(() => null),
    fetchAlerts().catch(() => null),
    fetchFires().catch(() => null)
  ]);
  if (!document.getElementById('aqNow')) return;   // user left the tab / re-rendered

  /* --- current corridor --- */
  const corridorVals = CORRIDOR.map((p, i) => {
    const r = corrRes[i];
    const ok = r.status === 'fulfilled' && r.value.current && r.value.current.us_aqi != null;
    return { name: p.name, aqi: ok ? Math.round(r.value.current.us_aqi) : null, pm: ok ? r.value.current.pm2_5 : null };
  });
  const fAqi = focusRes?.current?.us_aqi != null ? Math.round(focusRes.current.us_aqi) : null;
  const fb = aqiBand(fAqi);
  const asOf = focusRes?.current?.time ? new Date(focusRes.current.time).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '—';
  const rows = corridorVals.map(c => {
    const b = aqiBand(c.aqi);
    const w = c.aqi == null ? 0 : Math.min(100, c.aqi / 200 * 100);
    return `<div class="aq-row"><span class="aq-town">${esc(c.name)}</span>
      <span class="aq-track"><span class="aq-fill" style="width:${w}%;background:${b.color}"></span></span>
      <span class="aq-val" style="color:${b.color}">${c.aqi ?? '—'}</span>
      <span class="aq-cat" style="color:${b.color}">${b.short}</span></div>`;
  }).join('');
  document.getElementById('aqNow').innerHTML = `
    <div class="aq-hero">
      <div class="aq-num" style="color:${fb.color}">${fAqi ?? '—'}</div>
      <div><div class="aq-bandlabel" style="color:${fb.color}">${fb.label}</div>
        <div class="aq-sub">US AQI at ${esc(focus.name)} · PM2.5 ${focusRes?.current?.pm2_5 != null ? focusRes.current.pm2_5.toFixed(1) + ' µg/m³' : '—'} · as of ${asOf}</div></div>
    </div>
    ${rows}`;

  /* --- outlook chart --- */
  const days = focusRes ? dailyMax(focusRes).slice(0, 7) : [];
  const legend = `<div class="aq-legend">
    <span><i style="background:#6cc999"></i>Good ≤50</span><span><i style="background:#f2e276"></i>Moderate ≤100</span>
    <span><i style="background:#e6993f"></i>Sensitive ≤150</span><span><i style="background:#c74f63"></i>Unhealthy ≤200</span>
    <span><i style="background:#a678dd"></i>Very unhealthy ≤300</span><span><i style="background:#b04562"></i>Hazardous 300+</span></div>`;
  const alertsHtml = alertsRes === null
    ? `<div class="empty" style="padding:10px">Couldn't reach weather.gov alerts.</div>`
    : alertsRes.length
      ? alertsRes.map(a => {
          const hot = /extreme|severe/i.test(a.severity || '');
          const fg = hot ? 'var(--bad)' : 'var(--warn)';
          const bg = hot ? 'rgba(217,107,107,.18)' : 'rgba(217,165,95,.18)';
          return `<div class="alert-item"><span class="sev" style="background:${bg};color:${fg}">${esc(a.severity || 'Alert')}</span><span><b>${esc(a.event)}</b>${a.headline ? ' — ' + esc(a.headline) : ''}</span></div>`;
        }).join('')
      : `<div style="font-size:13px;color:var(--good);font-weight:600;padding:4px 0">✓ No active NWS alerts for this spot right now</div>`;
  document.getElementById('aqOutlook').innerHTML = days.length
    ? outlookChart(days) + legend + `<div style="height:12px"></div>${alertsHtml}`
    : `<div class="empty">Forecast unavailable right now.</div>`;

  /* --- fires --- */
  const fireEl = document.getElementById('fireList');
  if (firesRes === null) {
    fireEl.innerHTML = `<div class="empty">Couldn't reach the fire map — <a href="https://fire.airnow.gov" target="_blank" style="color:var(--accent-light)">check fire.airnow.gov</a> directly.</div>`;
  } else if (!firesRes.length) {
    fireEl.innerHTML = `<div style="font-size:13.5px;color:var(--good);font-weight:600;padding:4px 0">✓ No active US wildfire incidents on the map near the North Shore</div>`;
  } else {
    fireEl.innerHTML = firesRes.slice(0, 6).map(f => `
      <div class="pin-item"><span class="emoji">🔥</span>
        <div class="info">
          <div class="name">${esc(f.name)}</div>
          <div class="note">${f.acres ? Math.round(f.acres).toLocaleString() + ' acres' : 'size unknown'} · ${f.contained != null ? f.contained + '% contained' : 'containment unknown'}${f.mi != null ? ' · ' + f.mi + ' mi away' : ''}</div>
        </div></div>`).join('') +
      (firesRes.length > 6 ? `<div style="font-size:12px;color:var(--muted);padding-top:8px">+ ${firesRes.length - 6} more in the wider region</div>` : '');
  }

  /* --- hand it all to Scout --- */
  SMOKE_DATA = {
    fetchedAt: new Date().toLocaleString('en-US'),
    currentCorridorAQI: corridorVals,
    forecastDailyAQI: days,
    nwsAlerts: (alertsRes || []).map(a => a.event + (a.headline ? ': ' + a.headline : '')),
    firesNearby: (firesRes || []).slice(0, 8).map(f => ({ name: f.name, acres: f.acres, pctContained: f.contained, milesAway: f.mi }))
  };
  maybeVerdict(false);
}

/* SVG bar chart — daily max AQI, colored by band, deadline flagged */
function outlookChart(days) {
  const t = trip();
  const W = 340, H = 178, padT = 22, padB = 36, padL = 8, padR = 8;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = days.length;
  const maxV = Math.max(160, ...days.map(d => d.max)) * 1.12;
  const bw = Math.min(32, plotW / n - 10);
  const y100 = padT + plotH - (100 / maxV) * plotH;
  let s = `<svg id="aqChart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daily max AQI forecast">`;
  s += `<line x1="${padL}" x2="${W - padR}" y1="${y100}" y2="${y100}" stroke="#8b95ab" stroke-width="1" stroke-dasharray="4 4" opacity=".4"/>`;
  days.forEach((d, i) => {
    const cx = padL + (i + .5) * (plotW / n);
    const h = Math.max(3, (d.max / maxV) * plotH);
    const y = padT + plotH - h;
    const b = aqiBand(d.max);
    const dt = parseDate(d.date);
    const isDL = d.date === SMOKE_DEADLINE;
    s += `<rect x="${(cx - bw / 2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="4" fill="${b.color}"${isDL ? ' stroke="#e9edf5" stroke-width="1.5" stroke-dasharray="3 2"' : ''}/>`;
    s += `<text x="${cx}" y="${(y - 5).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#e9edf5">${d.max}</text>`;
    s += `<text x="${cx}" y="${H - 24}" text-anchor="middle" font-size="9.5" fill="#8b95ab">${fmtDate(dt, { weekday: 'short' })}</text>`;
    s += `<text x="${cx}" y="${H - 13}" text-anchor="middle" font-size="8.5" fill="#8b95ab">${dt.getMonth() + 1}/${dt.getDate()}</text>`;
    if (isDL) s += `<text x="${cx}" y="${H - 2}" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e9edf5">DECIDE</text>`;
  });
  s += `<text x="${W - padR}" y="${y100 - 4}" text-anchor="end" font-size="8.5" fill="#8b95ab" stroke="#131826" stroke-width="3" paint-order="stroke">AQI 100 — sensitive groups</text>`;
  s += '</svg>';
  return s;
}

/* ---------- Scout's verdict (Sonnet, 3-hr cache) ---------- */
let VERDICT_RUNNING = false;
async function maybeVerdict(force) {
  const card = document.getElementById('verdictCard'); if (!card) return;
  const st = smokeState();
  if (!DB.settings.apiKey) {
    card.innerHTML = `<div class="empty">Add your Anthropic API key in Settings and Scout will weigh in here with a go/no-go call.</div>`;
    return;
  }
  const fresh = st.verdict && (Date.now() - st.verdictAt < VERDICT_TTL);
  if (fresh && !force) { renderVerdict(); return; }
  if (VERDICT_RUNNING || !SMOKE_DATA) { if (st.verdict) renderVerdict(); return; }
  VERDICT_RUNNING = true;
  card.innerHTML = `<div class="empty">Scout is reading the smoke reports…</div>`;
  const t = trip();
  const sys = `You are Scout, the trip advisor inside Roamize, Nathan's personal trip app. He has a solo photography/drone trip to the North Shore of Lake Superior (based in Grand Marais MN, shooting along all of Highway 61 from Duluth to Grand Portage), ${t.start} to ${t.end}. Wildfire smoke is threatening the trip. His Airbnb is FULLY REFUNDABLE ONLY THROUGH END OF ${SMOKE_DEADLINE} — that is the decision deadline.
You will get a JSON snapshot: current US AQI along the corridor, daily-max AQI forecast (note it may not extend all the way to the trip dates), active NWS alerts, and nearby US fire incidents. Smoke often drifts from Canadian fires that will NOT be in the incident list but DOES show in AQI numbers and forecast.
Give ONE clear recommendation. "call" must be "go" (commit), "cancel" (cancel before the deadline), or "wait" (hold and re-check — only sensible while days remain before the deadline). "confidence" is your 0-100 certainty in that call. Guidance: AQI ≤100 is fine for a shoot day, 101-150 is hazy but workable (thin smoke can even make dramatic light), >150 sustained is a lost outdoor day. Weigh the trend direction heavily, and how many days remain to decide.
Respond with ONLY a raw JSON object, no markdown, no code fences: {"confidence": <int 0-100>, "call": "go"|"cancel"|"wait", "headline": "<short e.g. '78% — lean go'>", "why": "<2-4 plain-English sentences a wildfire novice gets>", "watch": "<the single most useful thing to check next>"}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': DB.settings.apiKey, 'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: VERDICT_MODEL, max_tokens: 700, system: sys,
        messages: [{ role: 'user', content: 'Today is ' + new Date().toLocaleString('en-US') + '. Data snapshot:\n' + JSON.stringify(SMOKE_DATA) }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API error');
    const raw = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const v = JSON.parse(raw.replace(/^[\s\S]*?\{/, '{').replace(/\}[\s\S]*$/, '}'));
    if (!v.call || v.confidence == null) throw new Error('bad verdict format');
    st.verdict = v; st.verdictAt = Date.now(); save();
    renderVerdict();
  } catch (e) {
    if (st.verdict) renderVerdict('· refresh failed, showing last verdict');
    else card.innerHTML = `<div class="empty">Couldn't get a verdict — ${esc(e.message || 'error')}.<br><br><button class="btn small" onclick="maybeVerdict(true)">Try again</button></div>`;
  }
  VERDICT_RUNNING = false;
}
function renderVerdict(note) {
  const card = document.getElementById('verdictCard');
  const st = smokeState(), v = st.verdict;
  if (!card || !v) return;
  const c = v.call === 'go' ? { col: 'var(--good)', bg: 'rgba(95,185,138,.16)', word: 'GO' }
    : v.call === 'cancel' ? { col: 'var(--bad)', bg: 'rgba(217,107,107,.16)', word: 'CANCEL' }
    : { col: 'var(--warn)', bg: 'rgba(217,165,95,.16)', word: 'WAIT' };
  card.innerHTML = `
    <div class="verdict-top">
      <span class="verdict-conf" style="color:${c.col}">${v.confidence}%</span>
      <span class="verdict-call" style="background:${c.bg};color:${c.col}">${c.word}</span>
    </div>
    <div class="verdict-head">${esc(v.headline || '')}</div>
    <p class="verdict-why">${esc(v.why || '')}</p>
    ${v.watch ? `<p class="verdict-watch">👁 Watch next: ${esc(v.watch)}</p>` : ''}
    <div class="verdict-meta">
      <span>Verdict from ${new Date(st.verdictAt).toLocaleString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit' })} · auto-refreshes every 3 hrs ${note ? esc(note) : ''}</span>
      <button onclick="maybeVerdict(true)">↻ Refresh now</button>
    </div>`;
}

/* ---------- the decision ---------- */
function decisionSheet() {
  openSheet(`<h2>Lock it in</h2>
    <p style="font-size:13.5px;color:var(--muted);margin:-6px 0 16px;line-height:1.5">Once decided, the app opens on Home again. Smoke Watch sticks around in the tab bar either way.</p>
    <button class="btn" onclick="lockDecision('go')">🎉 I'm going — trip is ON</button>
    <div style="height:10px"></div>
    <button class="btn ghost danger" onclick="lockDecision('cancel')">Canceling the trip</button>`);
}
function lockDecision(d) {
  const st = smokeState(); st.decided = true; st.decision = d; save();
  closeSheet(); renderSmoke();
  if (d === 'go') { confettiBurst(); toast('North Shore, here we come 🌲'); }
  else toast('Locked. Better to know than to hope.');
}
function undoDecision() { const st = smokeState(); st.decided = false; st.decision = ''; save(); renderSmoke(); }

/* keep the verdict fresh while the app sits open */
setInterval(() => {
  if (document.getElementById('tab-smoke').classList.contains('active')) maybeVerdict(false);
}, 10 * 60 * 1000);

/* ---------- boot ---------- */
window.addEventListener('resize', () => { if (MAP) setTimeout(() => MAP.invalidateSize(), 120); });
renderAll();
switchTab(smokeWatchActive() ? 'smoke' : 'home');
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
