/* ============================================================
   EXPLORE FEED — guides, fresh photos, live cams, videos.
   Refreshes on open, caches 6h → fresh at least twice a day.
   ============================================================ */
const FEED_TTL = 6 * 60 * 60 * 1000;
const CURATED = [
  { kind: 'cam', videoId: 'n0H5FkWkjjs', title: 'Grand Marais Harbor — live cam', source: 'YouTube Live', sub: 'Real-time look at harbor conditions. If the stream restarted, tap Scout This for the link.' },
  { kind: 'guide', url: 'https://wanderlog.com/list/itinerary/133552/5-day-grand-marais-itinerary/shared', title: '5-Day Grand Marais Itinerary', source: 'Wanderlog', sub: 'Day-by-day plan built around your exact base.' },
  { kind: 'guide', url: 'https://northshorevisitor.com/attractions/', title: 'North Shore attractions — mile-by-mile up Hwy 61', source: 'North Shore Visitor', sub: 'The all-in-one guide: parks, waterfalls, overlooks, and stops keyed to highway mileposts.' },
  { kind: 'guide', url: 'https://www.visitcookcounty.com/things-to-do/', title: 'Things to do in Cook County', source: 'Visit Cook County', sub: 'The official local guide for the Grand Marais / Lutsen / Grand Portage end of the shore.' }
];
let FEED_ITEMS = null, FEED_FILTER = 'all';
function savedList() { const t = trip(); return t.saved = t.saved || []; }
function feedKey() { return 'roamize.feed.' + trip().id; }
function safeId(s) { return String(s).replace(/[^a-zA-Z0-9]/g, '').slice(-26); }
function deent(s) { const e = document.createElement('textarea'); e.innerHTML = s || ''; return e.value; }
function timeAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 3600) return Math.max(1, Math.round(s / 60)) + 'm ago';
  if (s < 86400) return Math.round(s / 3600) + 'h ago';
  if (s < 86400 * 30) return Math.round(s / 86400) + 'd ago';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function feedTags() {
  const t = trip();
  const words = t.name.toLowerCase().replace(/[^a-z ]/g, '').split(/\s+/).filter(w => w.length > 2);
  const pinTags = t.pins.filter(p => (p.type || 'shoot') === 'shoot').map(p => p.name.toLowerCase().replace(/[^a-z]/g, ''));
  return [...new Set([words.join(''), ...pinTags])].filter(Boolean).slice(0, 12);
}

function renderFeed() {
  renderFeedChips();
  loadFeed(false);
}
function renderFeedChips() {
  const el = document.getElementById('feedChips');
  const chips = [['all', 'All'], ['guide', 'Guides'], ['photo', 'Photos'], ['video', 'Video'], ['saved', '💾 Saved']];
  el.innerHTML = chips.map(([k, l]) => `<button class="${FEED_FILTER === k ? 'on' : ''}" onclick="setFeedFilter('${k}')">${l}</button>`).join('')
    + `<button style="margin-left:auto" onclick="loadFeed(true)">↻ Fresh</button>`;
}
function setFeedFilter(k) { FEED_FILTER = k; renderFeedChips(); renderFeedItems(); }

async function loadFeed(force) {
  const scroll = document.getElementById('feedScroll'); if (!scroll) return;
  let cache = null;
  try { cache = JSON.parse(localStorage.getItem(feedKey())); } catch (e) {}
  if (cache && !force && Date.now() - cache.at < FEED_TTL) { FEED_ITEMS = cache.items; renderFeedItems(); return; }
  scroll.innerHTML = '<div class="empty">Scouting fresh finds along the shore…</div>';
  const [flickr, wiki, yt] = await Promise.all([
    fetchFlickr().catch(() => []),
    fetchWikiPhotos().catch(() => []),
    fetchYT().catch(() => [])
  ]);
  FEED_ITEMS = mixFeed(flickr, wiki, yt);
  try { localStorage.setItem(feedKey(), JSON.stringify({ at: Date.now(), items: FEED_ITEMS })); } catch (e) {}
  renderFeedItems();
}

/* Flickr public feed — JSONP, no key; recent uploads tagged with trip spots */
function fetchFlickr() {
  return new Promise(resolve => {
    let done = false;
    window.jsonFlickrFeed = data => {
      if (done) return; done = true;
      resolve((data.items || []).map(i => ({
        kind: 'photo', id: 'fl' + safeId(i.link), title: deent(i.title) || 'Untitled',
        url: i.link, img: (i.media?.m || '').replace('_m.', '_z.'),
        source: 'Flickr', sub: 'by ' + (i.author || '').replace(/.*\("([^"]+)"\).*/, '$1'),
        at: Date.parse(i.published) || Date.now(), taken: Date.parse(i.date_taken) || 0
      })).filter(p => p.img && (!p.taken || Date.now() - p.taken < 5 * 365 * 86400e3)));
    };
    const s = document.createElement('script');
    s.src = 'https://api.flickr.com/services/feeds/photos_public.gne?tags=' + encodeURIComponent(feedTags().join(',')) + '&tagmode=any&format=json';
    s.onerror = () => { if (!done) { done = true; resolve([]); } };
    document.head.appendChild(s);
    setTimeout(() => { if (!done) { done = true; resolve([]); } }, 8000);
  });
}

/* Wikimedia Commons — real photos shot near your pins, last 5 years */
async function fetchWikiPhotos() {
  const pins = trip().pins.filter(p => (p.type || 'shoot') === 'shoot').slice(0, 5);
  const all = [];
  await Promise.all(pins.map(async p => {
    try {
      const url = 'https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*' +
        '&generator=geosearch&ggsnamespace=6&ggslimit=6&ggsradius=3000' +
        `&ggscoord=${p.lat}%7C${p.lng}&prop=imageinfo&iiprop=url%7Ctimestamp&iiurlwidth=800`;
      const d = await (await fetch(url)).json();
      Object.values(d.query?.pages || {}).forEach(pg => {
        const ii = pg.imageinfo && pg.imageinfo[0];
        if (!ii || !/\.(jpe?g|png)$/i.test(ii.url)) return;
        const ts = Date.parse(ii.timestamp);
        if (Date.now() - ts > 5 * 365 * 86400e3) return;
        all.push({
          kind: 'photo', id: 'wm' + pg.pageid, title: (pg.title || '').replace(/^File:|\.\w+$/g, ''),
          url: ii.descriptionurl || ii.url, img: ii.thumburl, source: 'Wikimedia',
          sub: '📍 Shot near ' + p.name, at: ts
        });
      });
    } catch (e) {}
  }));
  const seen = new Set();
  return all.filter(x => !seen.has(x.id) && seen.add(x.id)).sort((a, b) => b.at - a.at).slice(0, 10);
}

/* YouTube — optional key unlocks live + fresh searched videos */
async function fetchYT() {
  const key = DB.settings.ytKey; if (!key) return [];
  const f = smokeFocus();
  const q = encodeURIComponent(trip().name.replace(/,/g, ' '));
  const base = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&key=' + key +
    `&q=${q}&location=${f.lat},${f.lng}&locationRadius=150mi`;
  const out = [];
  for (const extra of ['&eventType=live&maxResults=3', '&order=date&publishedAfter=' + new Date(Date.now() - 60 * 86400e3).toISOString().replace(/\.\d+Z/, 'Z')]) {
    try {
      const d = await (await fetch(base + extra)).json();
      (d.items || []).forEach(v => {
        if (!v.id?.videoId) return;
        out.push({
          kind: 'video', id: 'yt' + v.id.videoId, videoId: v.id.videoId,
          title: deent(v.snippet.title), url: 'https://www.youtube.com/watch?v=' + v.id.videoId,
          img: v.snippet.thumbnails?.high?.url || v.snippet.thumbnails?.medium?.url,
          source: 'YouTube', sub: deent(v.snippet.channelTitle),
          live: extra.includes('live'), at: Date.parse(v.snippet.publishedAt) || Date.now()
        });
      });
    } catch (e) {}
  }
  const seen = new Set();
  return out.filter(v => !seen.has(v.videoId) && seen.add(v.videoId));
}

function mixFeed(flickr, wiki, yt) {
  const cams = CURATED.filter(c => c.kind === 'cam').map(c => ({ ...c, id: 'cam' + c.videoId, url: 'https://www.youtube.com/watch?v=' + c.videoId, live: true, at: Date.now() }));
  const guides = CURATED.filter(c => c.kind === 'guide').map(c => ({ ...c, id: 'g' + safeId(c.url), at: 0 }));
  const liveYt = yt.filter(v => v.live);
  const rest = [...flickr, ...wiki, ...yt.filter(v => !v.live)].sort((a, b) => b.at - a.at);
  const out = [...cams, ...liveYt];
  let gi = 0;
  if (guides.length) out.push(guides[gi++]);         // one guide right up top
  rest.forEach((it, i) => {
    out.push(it);
    if ((i + 1) % 4 === 0 && gi < guides.length) out.push(guides[gi++]);
  });
  while (gi < guides.length) out.push(guides[gi++]);
  return out;
}

function findItem(id) { return (FEED_ITEMS || []).find(x => x.id === id) || savedList().find(x => x.id === id); }
function renderFeedItems() {
  const scroll = document.getElementById('feedScroll'); if (!scroll) return;
  let items = FEED_FILTER === 'saved' ? savedList() : (FEED_ITEMS || []);
  if (FEED_FILTER === 'guide') items = items.filter(i => i.kind === 'guide');
  if (FEED_FILTER === 'photo') items = items.filter(i => i.kind === 'photo');
  if (FEED_FILTER === 'video') items = items.filter(i => i.kind === 'video' || i.kind === 'cam');
  scroll.innerHTML = items.length ? items.map(feedCard).join('')
    : `<div class="empty">${FEED_FILTER === 'saved' ? 'Nothing saved yet — hit 💾 Save on anything worth keeping.' : 'Feed is quiet. Hit ↻ Fresh — or add a YouTube API key in Settings for more video.'}</div>`;
}
function isSaved(id) { return savedList().some(s => s.id === id); }
function toggleSave(id) {
  const list = savedList(), i = list.findIndex(s => s.id === id);
  if (i >= 0) { list.splice(i, 1); toast('Removed from saved'); }
  else { const it = findItem(id); if (it) { list.unshift(it); toast('Saved 💾'); } }
  save(); renderFeedItems();
}
function openItem(id) { const it = findItem(id); if (it && it.url) window.open(it.url, '_blank'); }
function playVid(id) {
  const it = findItem(id), holder = document.getElementById('vid-' + id);
  if (!it || !holder) return;
  holder.outerHTML = `<iframe class="feed-embed" src="https://www.youtube-nocookie.com/embed/${it.videoId}?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
}
function feedCard(it) {
  const savedCls = isSaved(it.id) ? 'saved' : '';
  const savedTxt = isSaved(it.id) ? '✓ Saved' : '💾 Save';
  let media = '';
  if (it.kind === 'cam') media = `<iframe class="feed-embed" src="https://www.youtube-nocookie.com/embed/${it.videoId}" allow="encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
  else if (it.kind === 'video') media = `<div class="feed-play" id="vid-${it.id}" onclick="playVid('${it.id}')"><img class="hero" src="${it.img}" loading="lazy" alt=""><span class="pp">▶️</span></div>`;
  else if (it.img) media = `<img class="hero" src="${it.img}" loading="lazy" alt="" onclick="openItem('${it.id}')">`;
  const meta = `<div class="fc-meta">
      ${it.live ? '<span class="live">● LIVE</span>' : ''}
      <span class="src">${esc(it.source || '')}</span>
      ${it.at ? `<span>${timeAgo(it.at)}</span>` : ''}
    </div>`;
  const actions = `<div class="fc-actions">
      ${it.kind === 'guide' ? `<button onclick="openReaderById('${it.id}')">📖 Read</button>` : ''}
      <button class="${savedCls}" onclick="toggleSave('${it.id}')">${savedTxt}</button>
      <button class="scout" onclick="scoutThis('${it.id}')">✦ Scout This</button>
    </div>`;
  return `<div class="feed-card">${media}<div class="fc-body">${meta}
    <div class="fc-title">${esc(it.title || '')}</div>
    ${it.sub ? `<div class="fc-sub">${esc(it.sub)}</div>` : ''}
    ${actions}</div></div>`;
}
function scoutThis(id) {
  const it = findItem(id); if (!it) return;
  openScout(); newChat();
  const input = document.getElementById('chatInput');
  input.value = `Scout this from my feed: "${it.title}" (${it.url}) — `;
  input.focus(); input.setSelectionRange(input.value.length, input.value.length);
  input.dispatchEvent(new Event('input'));
}

/* ---------- in-app reader (jina.ai clean-text proxy, free) ---------- */
let READER_URL = '';
function openReaderById(id) { const it = findItem(id); if (it) openReader(it.url, it.title); }
async function openReader(url, title) {
  READER_URL = url;
  document.getElementById('readerTitle').textContent = title || '';
  const body = document.getElementById('readerBody');
  body.innerHTML = '<div class="empty">Pulling a clean copy…</div>';
  document.getElementById('reader').classList.add('open');
  try {
    const res = await fetch('https://r.jina.ai/' + url);
    if (!res.ok) throw 0;
    let md = await res.text();
    if (md.length < 200) throw 0;
    body.innerHTML = mdArticle(md);
    body.scrollTop = 0;
  } catch (e) {
    body.innerHTML = `<div class="empty">Couldn't pull a clean copy of this one.<br><br><button class="btn small" onclick="window.open(READER_URL,'_blank')">Open the original ↗</button></div>`;
  }
}
document.getElementById('readerClose').addEventListener('click', () => document.getElementById('reader').classList.remove('open'));
document.getElementById('readerOrig').addEventListener('click', () => window.open(READER_URL, '_blank'));
function mdArticle(md) {
  md = md.replace(/^Title:.*$/m, '').replace(/^URL Source:.*$/m, '').replace(/^Published Time:.*$/m, '').replace(/^Markdown Content:$/m, '');
  return md.split(/\n{2,}/).map(block => {
    let b = block.trim(); if (!b) return '';
    if (/^#{1,4}\s/.test(b)) return '<h3>' + esc(b.replace(/^#+\s*/, '')) + '</h3>';
    b = esc(b);
    b = b.replace(/!\[([^\]]*)\]\((https?:[^)\s]+)\)/g, '<img src="$2" loading="lazy" alt="$1">');
    b = b.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    b = b.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return '<p>' + b + '</p>';
  }).join('');
}

/* ============================================================
   ROUTE PLANNER 🧭 — pick stops from your pins, see the real
   drive (OSRM, free), hand off to Apple Maps.
   ============================================================ */
let ROUTE = { layers: [], data: null, active: 0, stops: [] };
document.getElementById('routeBtn').addEventListener('click', routeSheet);
function routeOptionsHtml() {
  const t = trip();
  return `<option value="">— pick —</option><option value="me">📍 Current location</option><option value="base">🏠 ${esc(t.base.label)}</option>` +
    t.pins.map(p => `<option value="${p.id}">${pinType(p).emoji} ${esc(p.name)}</option>`).join('');
}
function routeSheet() {
  const row = i => `<div class="field"><label>Stop ${String.fromCharCode(65 + i)}</label><select class="routeStop">${routeOptionsHtml()}</select></div>`;
  openSheet(`<h2>🧭 Route planner</h2>
    <div id="routeStops">${row(0)}${row(1)}</div>
    <button class="add-anchor" id="addStopBtn">+ Add another stop</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="previewRoute()">Preview route</button>`);
  sheetEl.querySelector('.routeStop').value = 'base';
  document.getElementById('addStopBtn').onclick = () => {
    const n = sheetEl.querySelectorAll('.routeStop').length;
    if (n >= 5) return toast('Five stops max — it’s a road trip, not a milk run');
    document.getElementById('routeStops').insertAdjacentHTML('beforeend', row(n));
  };
}
function stopCoord(v) {
  const t = trip();
  if (v === 'me') return { name: 'Current location', me: true, lat: null, lng: null };
  if (v === 'base') return { name: t.base.label, lat: t.base.lat, lng: t.base.lng };
  const p = t.pins.find(x => x.id === v);
  return p ? { name: p.name, lat: p.lat, lng: p.lng } : null;
}
async function previewRoute() {
  const stops = [...sheetEl.querySelectorAll('.routeStop')].map(s => s.value).filter(Boolean).map(stopCoord).filter(Boolean);
  if (stops.length < 2) return toast('Pick at least a start and an end');
  closeSheet(); switchTab('home'); toast('Routing…');
  for (const s of stops) {
    if (!s.me) continue;
    try {
      const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000, maximumAge: 60000 }));
      s.lat = pos.coords.latitude; s.lng = pos.coords.longitude;
    } catch (e) {
      const b = trip().base; s.lat = b.lat; s.lng = b.lng;
      toast('No location fix — previewing from home base');
    }
  }
  try {
    const coords = stops.map(s => `${s.lng},${s.lat}`).join(';');
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?alternatives=true&overview=full&geometries=geojson`);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes?.length) throw 0;
    ROUTE = { layers: [], data, active: 0, stops };
    drawRoute();
  } catch (e) { toast('Routing service unavailable — give it a minute and retry'); }
}
function clearRoute(keepData) {
  ROUTE.layers.forEach(l => MAP.removeLayer(l)); ROUTE.layers = [];
  if (!keepData) {
    ROUTE.data = null;
    const b = document.getElementById('routeBar'); if (b) b.style.display = 'none';
    renderMap();
  }
}
function drawRoute() {
  clearRoute(true);
  const { data, active, stops } = ROUTE;
  const order = data.routes.map((_, i) => i).filter(i => i !== active).concat(active);   // active drawn last, on top
  order.forEach(i => {
    const isA = i === active;
    const line = L.geoJSON(data.routes[i].geometry, {
      style: { color: isA ? '#7da2d9' : '#8b95ab', weight: isA ? 5 : 3, opacity: isA ? .95 : .45, dashArray: isA ? null : '6 8' }
    });
    line.on('click', () => { ROUTE.active = i; drawRoute(); });
    line.addTo(MAP); ROUTE.layers.push(line);
  });
  MAP.fitBounds(ROUTE.layers[ROUTE.layers.length - 1].getBounds(), { padding: [40, 40] });
  const fmtR = r => `${(r.distance / 1609.34).toFixed(r.distance > 16093 ? 0 : 1)} mi · ${r.duration >= 3600 ? Math.floor(r.duration / 3600) + 'h ' + Math.round(r.duration % 3600 / 60) + 'm' : Math.round(r.duration / 60) + ' min'}`;
  const bar = document.getElementById('routeBar');
  bar.innerHTML = `
    <div class="rstops">${stops.map(s => esc(s.name)).join(' → ')}</div>
    <div class="ralt">${data.routes.map((r, i) => `<button class="${i === active ? 'on' : ''}" onclick="ROUTE.active=${i};drawRoute()">${i === 0 ? 'Fastest' : 'Alt ' + i} · ${fmtR(r)}</button>`).join('')}</div>
    <div class="racts">
      <button class="btn small" style="flex:1" onclick="openAppleMaps()"> Open in Apple Maps</button>
      <button class="btn ghost small" onclick="clearRoute()">✕ Clear</button>
    </div>`;
  bar.style.display = 'block';
}
function openAppleMaps() {
  const s = ROUTE.stops; if (!s || s.length < 2) return;
  /* first stop = current location → omit saddr; Apple Maps then starts wherever he is */
  const saddr = s[0].me ? '' : `saddr=${s[0].lat},${s[0].lng}&`;
  window.open(`https://maps.apple.com/?${saddr}daddr=${s.slice(1).map(x => x.lat + ',' + x.lng).join('+to:')}&dirflg=d`, '_blank');
}

/* ---------- boot ---------- */
window.addEventListener('resize', () => { if (MAP) setTimeout(() => MAP.invalidateSize(), 120); });
renderAll();
switchTab('home');
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
